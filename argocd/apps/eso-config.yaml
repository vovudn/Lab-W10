# ArgoCD App: Deploy ESO Configuration (SecretStore + ExternalSecret)
# Sync wave 0: Deploy sau khi ESO operator đã sẵn sàng (wave -1)
#
# ✅ ENABLED: Auto-sync working với AWS credentials thật
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eso-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/vovudn/Lab-W10.git
    path: eso
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
