# ExternalSecret: Map AWS Secret -> K8s Secret với auto-refresh
# Sync wave 1: Deploy sau khi SecretStore đã tạo (wave 0)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  # Refresh interval < 60s (yêu cầu rotate trong 60s)
  refreshInterval: 30s
  
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  
  target:
    name: db-secret
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app: api
      data:
        # Template để format secret data
        db-password: "{{ .password | toString }}"
        db-username: "{{ .username | toString }}"
        db-host: "{{ .host | toString }}"
        db-port: "{{ .port | toString }}"
  
  # Map AWS Secret keys to K8s Secret keys
  dataFrom:
    - extract:
        key: demo/db-credentials
        # AWS Secret structure:
        # {
        #   "username": "admin",
        #   "password": "changeme123",
        #   "host": "db.example.com",
        #   "port": "5432"
        # }
